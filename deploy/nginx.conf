# AntíJitter nginx config
# Managed by: deploy.sh (tokens __DOMAIN__ and __STATIC_DIR__ are replaced at deploy time)
# Certbot will append SSL directives below the HTTP block automatically.

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Let certbot handle ACME challenges before the redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    # SSL — certbot fills these in; placeholders keep nginx -t happy before certbot runs
    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header Referrer-Policy           "strict-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── WebSocket  (/ws/*) ────────────────────────────────────────────────────
    # Must come before /api to avoid prefix collision
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        # Keep WS connections alive for up to 1 h (gaming sessions can be long)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── FastAPI  (/api/*) ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Stripe webhooks can send large payloads
        client_max_body_size 2m;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── React SPA  (everything else) ─────────────────────────────────────────
    root __STATIC_DIR__;
    index index.html;

    location / {
        # Serve files; fall back to index.html for client-side routing
        try_files $uri $uri/ /index.html;
    }

    # Long-cache for hashed Vite assets (js/css/img)
    location ~* \.(js|css|woff2?|png|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache index.html so React router updates land immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
